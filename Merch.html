<script>
console.log("=== DEBUG MODE DETECTION ===");
var match = document.cookie.match(/(?:^|;\s*)mode=(darkMode|lightMode)/);
var mode = match ? match[1] : "lightMode";
console.log("Cookie mode found:", mode);

function setModeClass() {
  if (document.body) {
    console.log("Body classes before:", document.body.className);
    if (!document.body.classList.contains(mode)) {
      document.body.classList.add(mode);
      console.log("Added mode class:", mode);
    }
    console.log("Body classes after:", document.body.className);
    
    // Set icons and logos based on mode
    setTimeout(function() {
      const CompanyLogo = document.querySelector('.navbar-brand img');
      const iconImg = document.querySelector('.changeScreenModeIcon img');
      
      if (mode === 'darkMode') {
        if (iconImg) iconImg.src = 'resources/lightModeIcon.png';
        if (CompanyLogo) CompanyLogo.src = 'resources/RedhedLogoDM.png';
      } else {
        if (iconImg) iconImg.src = 'resources/darkModeIcon.png';
        if (CompanyLogo) CompanyLogo.src = 'resources/RedhedLogoLM.png';
      }
    }, 100); // Small delay to ensure navbar is loaded
    
  } else {
    console.log("Body not ready, retrying...");
    setTimeout(setModeClass, 1);
  }
}
setModeClass();
</script>

    <script>
        // Sets a cookie with the given name, value, and expiration in days
        function setCookie(cname, cvalue, exdays) {
            const d = new Date();
            d.setTime(d.getTime() + (exdays*24*60*60*1000));
            let expires = "expires="+ d.toUTCString();
            document.cookie = cname + "=" + cvalue + ";" + expires + ";path=/";
        }
        // Retrieves the value of a cookie by name
        function getCookie(cname) {
            let name = cname + "=";
            let decodedCookie = decodeURIComponent(document.cookie);
            let ca = decodedCookie.split(';');
            for(let i = 0; i < ca.length; i++) {
                let c = ca[i];
                while (c.charAt(0) == ' ') {
                    c = c.substring(1);
                }
                if (c.indexOf(name) == 0) {
                    return c.substring(name.length, c.length);
                }
            }
            return "";
        }

        // Toggles between light and dark mode for the site
        // Updates the body class, icon image, logo, and saves the mode in a cookie
        function changeMode(){
            let currentMode;
            const iconImg = document.querySelector('.changeScreenModeIcon img');
            const CompanyLogo = document.querySelector('.navbar-brand img');
            if (document.body.classList.contains('darkMode')) {
                document.body.classList.remove('darkMode');
                document.body.classList.add('lightMode');
                currentMode = 'lightMode';
                if (iconImg) {
                    iconImg.src = 'resources/darkModeIcon.png'; // light mode icon
                }
                if (CompanyLogo) {
                    CompanyLogo.src = 'resources/RedhedLogoLM.png'; // light mode logo
                }
            }
            else if (document.body.classList.contains('lightMode')) {
                document.body.classList.remove('lightMode');
                document.body.classList.add('darkMode');
                currentMode = 'darkMode';
                if (iconImg) {
                    iconImg.src = 'resources/lightModeIcon.png'; // dark mode icon
                }
                if (CompanyLogo) {
                    CompanyLogo.src = 'resources/RedhedLogoDM.png'; // dark mode logo
                }
            }
            setCookie('mode', currentMode, 30);
        }
        function reserveMerch(customerId, merchId) {
            fetch('/reserve', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ customerId, merchId })
            })
            .then(res => res.json())
            .then(data => alert(data.message))
            .catch(err => alert('Error: ' + err));
        }
    </script>
